name: Build EXE

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Vite App
        run: npm run build

      - name: Build Electron EXE
        run: npx electron-builder

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: supershop-exe
          path: release/
